name: 编译 Windows 版本

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows:
    name: Windows 编译 + 打包
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Qt 6.5
        id: install_qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qt5compat'

      - name: 安装 NSIS
        run: |
          choco install nsis -y
          echo "NSIS 安装完成"

      - name: 配置 CMake
        run: |
          echo "Qt 路径: ${{ steps.install_qt.outputs.dir }}"
          echo "Qt6_DIR 环境变量: $env:Qt6_DIR"
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_PREFIX_PATH="${{ steps.install_qt.outputs.dir }}"
        shell: pwsh

      - name: 编译 Release 版本
        run: |
          cd build
          cmake --build . --config Release -j 8
        shell: pwsh

      - name: 运行单元测试
        run: |
          cd build
          ctest -C Release --output-on-failure
        shell: pwsh
        continue-on-error: true  # 测试失败不阻止打包

      - name: 部署 Qt 运行库
        run: |
          $qtDir = "${{ steps.install_qt.outputs.dir }}"
          $qtBin = "$qtDir\bin"
          $exePath = "build\src\platform\windows\Release\UnifiedInputMethod.exe"
          echo "Qt bin 目录: $qtBin"
          & "$qtBin\windeployqt.exe" --release --no-translations --no-system-d3d-compiler --no-opengl-sw $exePath
          echo "Qt 运行库部署完成"
        shell: pwsh

      - name: 打包安装程序
        run: |
          # 找到 makensis.exe
          $nsisPath = Get-ChildItem "C:\Program Files (x86)\NSIS\makensis.exe" -ErrorAction SilentlyContinue
          if (-not $nsisPath) {
            $nsisPath = Get-ChildItem "C:\Program Files\NSIS\makensis.exe" -ErrorAction SilentlyContinue
          }
          if ($nsisPath) {
            & $nsisPath installer.nsi
            echo "安装包打包完成"
          } else {
            echo "警告：未找到 NSIS，跳过打包"
          }
        shell: pwsh
        continue-on-error: true

      - name: 准备发布文件
        run: |
          mkdir release
          # 复制主程序和 DLL
          Copy-Item -Path "build\src\platform\windows\Release\*" -Destination "release\" -Recurse -Force
          # 复制安装包（如果有）
          if (Test-Path "*安装包*.exe") {
            Copy-Item -Path "*安装包*.exe" -Destination "release\" -Force
          }
          # 复制文档
          Copy-Item -Path "README.md" -Destination "release\" -Force
          Copy-Item -Path "BUILD.md" -Destination "release\" -Force
          echo "发布文件准备完成"
        shell: pwsh

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: UnifiedInputMethod-Windows
          path: release/
          retention-days: 30

      - name: 上传安装包
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: 统一输入法安装包
          path: "*安装包*.exe"
          retention-days: 90
        continue-on-error: true
